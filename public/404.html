<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Axisora Forge</title>
    <script>
      // GitHub Pages SPA routing fix.
      // When someone navigates directly to /programs/java-fullstack or refreshes,
      // GitHub Pages returns this 404.html. We store the path in sessionStorage
      // and redirect to /, where the React app will read it and navigate correctly.
      var path = window.location.pathname;
      var base = "/axisora/"; // Change to "/<repo-name>/" if deploying to a sub-path
      // Strip the base from path before storing
      var stripped = path.startsWith(base) ? path.slice(base.length - 1) : path;
      sessionStorage.setItem("spa_redirect", stripped + window.location.search);
      window.location.replace(base);
    </script>
  </head>
  <body></body>
</html>
